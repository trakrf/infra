# Default values for trakrf-backend.

# Drop the doubled `<release>-<chart>` pod/resource name.
fullnameOverride: trakrf-backend

replicaCount: 1

image:
  repository: ghcr.io/trakrf/backend
  tag: sha-628bb5c
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# HPA stub — disabled for M1 demo. See TRA-351.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

# Pod security. Backend Dockerfile does not yet run as non-root (TRA-84).
# Once Dockerfile is fixed, flip runAsNonRoot: true and set runAsUser.
podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

# Database (CNPG). PG_URL is assembled from the CNPG-managed role secret.
database:
  # Name of CNPG managed.roles passwordSecret (password key)
  credentialsSecret: trakrf-app-credentials
  user: trakrf-app
  host: trakrf-db-rw
  port: 5432
  name: trakrf
  sslmode: require

# Non-secret config (ConfigMap)
config:
  appEnv: production
  logLevel: info
  serviceName: trakrf-backend
  corsOrigin: ""
  jwtExpirationSeconds: "3600"

# Secrets. Values here land in a K8s Secret created by this chart.
# For real deployments, override via values.secret.yaml (gitignored):
#   helm upgrade ... -f values.secret.yaml
secrets:
  jwtSecret: "change-me"
  resendApiKey: ""
  sentryDsn: ""

nodeSelector: {}
tolerations: []
affinity: {}

# Schema migration Job (TRA-361).
# When `image` is unset, a ConfigMap is rendered from helm/trakrf-backend/migrations/
# and mounted into a generic migrate/migrate image.
# When `image` is set (e.g., once TRA-363 publishes the backend image with migrations baked
# in at /app/db/migrations), the ConfigMap is skipped and that image is used directly.
migrate:
  enabled: true
  image: ""                            # e.g., ghcr.io/trakrf/backend:sha-abc123
  defaultImage: migrate/migrate:v4.17.0
  credentialsSecret: trakrf-migrate-credentials
  # Connection target — separate from `database:` because `database:` is the app role (trakrf-app),
  # while migrations run as trakrf-migrate.
  user: trakrf-migrate
  host: trakrf-db-rw
  port: 5432
  database: trakrf
  sslmode: require
