{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "trakrf-backend.fullname" . }}-migrate
  labels:
    {{- include "trakrf-backend.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "trakrf-backend.labels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ required "image.tag must be set (usually in values-<cluster>.yaml)" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/server", "migrate"]
          env:
            - name: PGUSER
              value: {{ .Values.migrate.user | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.migrate.credentialsSecret }}
                  key: password
            - name: PG_URL
              value: "postgresql://$(PGUSER):$(PGPASSWORD)@{{ .Values.migrate.host }}:{{ .Values.migrate.port }}/{{ .Values.migrate.database }}?sslmode={{ .Values.migrate.sslmode }}&options=-c%20search_path%3D{{ .Values.migrate.searchPath }}"
{{- end }}
