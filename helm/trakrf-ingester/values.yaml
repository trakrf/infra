# Default values for trakrf-ingester.

# Drop the doubled `<release>-<chart>` pod/resource name.
fullnameOverride: trakrf-ingester

replicaCount: 1

# Stock Redpanda Connect image. Pin a specific tag — the platform Dockerfile
# does not currently pin, which is a separate concern (TRA-84 / upstream fix).
image:
  repository: docker.redpanda.com/redpandadata/connect
  tag: "4.40.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

podSecurityContext: {}
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  # Redpanda Connect image's `connect` user = UID 10001; required for
  # runAsNonRoot validation (k8s rejects non-numeric image USER).
  runAsUser: 10001
  runAsGroup: 10001

# Database (CNPG) — same pattern as trakrf-backend.
database:
  credentialsSecret: trakrf-app-credentials
  user: trakrf-app
  host: trakrf-db-rw
  port: 5432
  name: trakrf
  sslmode: require
  # See trakrf-backend values for the full rationale; needed so trigger
  # functions resolve sequences in the trakrf schema. Matches the backend
  # ordering (`public,trakrf`) for consistency. TRA-278 will make the
  # schema name itself configurable.
  searchPath: "public,trakrf"

# MQTT config
mqtt:
  # Non-secret
  clientId: trakrf-ingester
  topic: "trakrf/scans/#"
  # Secret. Full URL including credentials, e.g.
  #   mqtts://user:pass@broker.emqxcloud.com:8883
  url: ""

# Prometheus metrics exposed by Redpanda Connect's built-in HTTP server.
metrics:
  enabled: true
  port: 4195

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

nodeSelector: {}
tolerations: []
affinity: {}
