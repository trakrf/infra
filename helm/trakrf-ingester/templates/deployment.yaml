apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trakrf-ingester.fullname" . }}
  labels:
    {{- include "trakrf-ingester.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Ingester holds an MQTT session; avoid overlapping pods during updates.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "trakrf-ingester.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        # MQTT credentials live in an out-of-band Secret (`just ingester-secrets`),
        # so no chart-managed checksum — rotate via `kubectl rollout restart` after
        # updating the Secret.
      labels:
        {{- include "trakrf-ingester.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: ingester
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.metrics.enabled }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - run
            - /etc/connect/connect.yaml
          env:
            - name: MQTT_TOPIC
              value: {{ .Values.mqtt.topic | quote }}
            - name: MQTT_CLIENT_ID
              value: {{ .Values.mqtt.clientId | quote }}
            - name: MQTT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mqtt.credentialsSecret }}
                  key: MQTT_URL
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.credentialsSecret }}
                  key: password
            - name: PG_URL
              value: "postgresql://{{ .Values.database.user }}:$(PG_PASSWORD)@{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}?sslmode={{ .Values.database.sslmode }}&options=-c%20search_path%3D{{ .Values.database.searchPath }}"
          volumeMounts:
            - name: config
              mountPath: /etc/connect
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "trakrf-ingester.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
