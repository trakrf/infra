# helm/monitoring/manifests/grafana-ingressroute.yaml
# Public ingress for Grafana (TRA-386). Out-of-chart because the
# kube-prometheus-stack chart does not manage Traefik CRDs, and keeping it
# here lets values.yaml stay an unmodified upstream-values overlay.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.eks.trakrf.app`)
      kind: Rule
      middlewares:
        - name: default-chain
          namespace: traefik
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls: {}
