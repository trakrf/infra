# helm/monitoring/manifests-aks/grafana-ingressroute.yaml
# Public ingress for Grafana on AKS. Mirrors the EKS variant in manifests-eks/
# with the aks.trakrf.app host.
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: kube-prometheus-stack
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.aks.trakrf.app`)
      kind: Rule
      middlewares:
        - name: default-chain
          namespace: traefik
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  tls: {}
