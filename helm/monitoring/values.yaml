# helm/monitoring/values.yaml
# Overrides for prometheus-community/kube-prometheus-stack.
# Pinned chart version is enforced by `just monitoring-bootstrap`, not here.

fullnameOverride: kube-prometheus-stack

# Discover ServiceMonitors / PodMonitors / PrometheusRules in any namespace,
# without requiring our app charts to add a release-specific label.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

grafana:
  defaultDashboardsEnabled: true
  persistence:
    enabled: true
    storageClassName: gp3
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
