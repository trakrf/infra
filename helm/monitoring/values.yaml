# helm/monitoring/values.yaml
# Overrides for prometheus-community/kube-prometheus-stack.
# Pinned chart version is enforced by `just monitoring-bootstrap`, not here.

fullnameOverride: kube-prometheus-stack

# Discover ServiceMonitors / PodMonitors / PrometheusRules in any namespace,
# without requiring our app charts to add a release-specific label.
# Tolerate webhook unavailability — avoids deadlock where ServiceMonitor /
# PrometheusRule applies fail because the operator's webhook pod is down.
prometheusOperator:
  admissionWebhooks:
    failurePolicy: Ignore
    patch:
      enabled: true

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    retention: 15d
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 1Gi }
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi

alertmanager:
  alertmanagerSpec:
    resources:
      requests: { cpu: 50m,  memory: 64Mi }
      limits:   { cpu: 200m, memory: 128Mi }
    storage:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

grafana:
  defaultDashboardsEnabled: true
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
  persistence:
    enabled: true
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
    datasources:
      enabled: true
