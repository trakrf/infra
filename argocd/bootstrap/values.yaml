# ArgoCD Helm values — common multi-cluster defaults.
# Chart: argo/argo-cd ~9.5
# Cluster-specific overrides (e.g. EKS IRSA SA annotations) live in
# argocd/bootstrap/values-<cluster>.yaml, selected by `just argocd-bootstrap CLUSTER`.
# After bootstrap, ArgoCD self-manages via the argocd Application in argocd/root/.

global:
  domain: ""  # No ingress — access via port-forward

# Server-side diff enables managedFieldsManagers in ignoreDifferences —
# ArgoCD asks the Kubernetes API for a 3-way diff that respects field
# ownership. Without this, only jsonPointers/jqPathExpressions work.
# This is the modern recommended default in ArgoCD 2.10+.
configs:
  cm:
    controller.diff.server.side: "true"
  params:
    controller.diff.server.side: "true"

server:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

controller:
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

dex:
  enabled: false

notifications:
  enabled: false
