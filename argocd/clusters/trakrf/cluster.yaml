apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: trakrf-db
  namespace: trakrf
spec:
  instances: 1
  imageName: ghcr.io/clevyr/cloudnativepg-timescale:17.2-ts2.18

  postgresql:
    shared_preload_libraries:
      - timescaledb
    parameters:
      timescaledb.license: timescale
      password_encryption: scram-sha-256

  bootstrap:
    initdb:
      database: trakrf
      owner: trakrf-migrate
      postInitTemplateSQL:
        - CREATE EXTENSION IF NOT EXISTS timescaledb
      postInitSQL:
        - CREATE ROLE "trakrf-app" LOGIN
      postInitApplicationSQL:
        # Pre-create the trakrf schema so schema-scoped grants below have a target.
        # Migration 000001 uses CREATE SCHEMA IF NOT EXISTS, so this is compatible.
        - CREATE SCHEMA trakrf AUTHORIZATION "trakrf-migrate"
        - GRANT CONNECT ON DATABASE trakrf TO "trakrf-app"
        - GRANT USAGE ON SCHEMA trakrf TO "trakrf-app"
        - ALTER DEFAULT PRIVILEGES FOR ROLE "trakrf-migrate" IN SCHEMA trakrf GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO "trakrf-app"
        - ALTER DEFAULT PRIVILEGES FOR ROLE "trakrf-migrate" IN SCHEMA trakrf GRANT USAGE, SELECT ON SEQUENCES TO "trakrf-app"

  managed:
    roles:
      - name: trakrf-app
        ensure: present
        login: true
        superuser: false
        createdb: false
        createrole: false
        passwordSecret:
          name: trakrf-app-credentials
      - name: trakrf-migrate
        ensure: present
        login: true
        superuser: false
        createdb: true
        createrole: false
        passwordSecret:
          name: trakrf-migrate-credentials

  storage:
    size: 10Gi
    storageClass: gp3
