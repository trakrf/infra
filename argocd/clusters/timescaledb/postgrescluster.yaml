apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: trakrf-db
  namespace: crunchy-postgres
spec:
  image: timescale/timescaledb-ha:pg17
  postgresVersion: 17

  patroni:
    dynamicConfiguration:
      postgresql:
        parameters:
          shared_preload_libraries: timescaledb

  instances:
    - name: instance1
      replicas: 1
      dataVolumeClaimSpec:
        accessModes: [ReadWriteOnce]
        storageClassName: gp3
        resources:
          requests:
            storage: 10Gi

  backups:
    pgbackrest:
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes: [ReadWriteOnce]
              storageClassName: gp3
              resources:
                requests:
                  storage: 5Gi

  users:
    - name: postgres
      databases: [trakrf]
    - name: trakrf-app
      databases: [trakrf]
      options: "NOSUPERUSER NOCREATEDB NOCREATEROLE"
    - name: trakrf-migrate
      databases: [trakrf]
      options: "NOSUPERUSER CREATEDB NOCREATEROLE"
