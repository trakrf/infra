# Traefik — upstream chart. AKS injects static LB IP + azure-load-balancer-
# resource-group annotation so cloud-controller binds to the TF-managed PIP.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: trakrf
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "39.*"
    helm:
      values: |
        deployment:
          replicas: 2
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        # Allow IngressRoutes in trakrf/monitoring/etc namespaces to reference
        # the shared default-chain Middleware in the traefik namespace.
        # Default in Traefik v3 is false; our chart layout depends on it.
        providers:
          kubernetesCRD:
            allowCrossNamespace: true
        # Chart-native Prometheus scrape: enable the dedicated ClusterIP
        # metrics Service + ServiceMonitor. kube-prometheus-stack discovers
        # the SM via wide-open selectors in helm/monitoring/values.yaml.
        metrics:
          prometheus:
            service:
              enabled: true
            serviceMonitor:
              enabled: true
        {{- if eq .Values.cluster "aks" }}
        service:
          spec:
            loadBalancerIP: {{ .Values.traefikLbIp | quote }}
          annotations:
            service.beta.kubernetes.io/azure-load-balancer-resource-group: {{ .Values.mainResourceGroupName | quote }}
        {{- else if eq .Values.cluster "gke" }}
        service:
          spec:
            loadBalancerIP: {{ .Values.traefikLbIp | quote }}
        # GKE auto-applies kubernetes.io/arch=arm64:NoSchedule to ARM pools;
        # AKS Ubuntu does not. See TRA-470. Traefik v3 values put `tolerations`
        # at the top level, not under `deployment.`.
        tolerations:
          - key: kubernetes.io/arch
            operator: Equal
            value: arm64
            effect: NoSchedule
        {{- end }}
  destination:
    server: {{ .Values.destination.server }}
    namespace: {{ .Values.namespaces.traefik }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
