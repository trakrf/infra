{{- $inlineValues := "" -}}
{{- if eq .Values.cluster "aks" -}}
{{- /* Azure DNS solver with workload identity — NO top-level tenantID/clientID
       allowed alongside managedIdentity per cert-manager webhook. */ -}}
{{- $inlineValues = printf "azureDNS:\n  resourceGroupName: %s\n  subscriptionID: %s\n  managedIdentity:\n    clientID: %s\n"
    .Values.dnsZoneResourceGroup
    .Values.subscriptionId
    .Values.certManagerIdentityClientId
-}}
{{- else if eq .Values.cluster "gke" -}}
{{- /* Cloud DNS solver via GKE Workload Identity — no secret/token in spec;
       the K8s SA annotation (argocd/root/templates/cert-manager.yaml) does auth.
       hostedZoneName is the Cloud DNS managed-zone RESOURCE NAME, not DNS name. */ -}}
{{- $inlineValues = printf "cloudDNS:\n  project: %s\n  hostedZoneName: %s\n"
    .Values.gcpProjectId
    .Values.cloudDnsZoneName
-}}
{{- end -}}
{{- include "trakrf.application" (dict
  "name" "cert-manager-config"
  "path" "helm/cert-manager-config"
  "namespace" .Values.namespaces.certManager
  "syncWave" "0"
  "cluster" .Values.cluster
  "repoURL" .Values.repoURL
  "targetRevision" .Values.targetRevision
  "destination" .Values.destination
  "inlineValues" $inlineValues
) }}
