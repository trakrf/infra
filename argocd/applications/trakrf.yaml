apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trakrf-db
  namespace: argocd
spec:
  project: trakrf
  source:
    repoURL: https://github.com/trakrf/infra.git
    path: argocd/clusters/trakrf
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: trakrf
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    # CNPG admission webhook injects these defaults into every entry of
    # spec.managed.roles[]. ArgoCD's argocd-controller field-manager owns
    # the whole array, so the webhook-injected defaults aren't in its
    # Apply and ArgoCD reports permanent drift. Pinning the defaults in
    # cluster.yaml would couple us to operator-version defaults; ignoring
    # them here is durable across CNPG upgrades.
    - group: postgresql.cnpg.io
      kind: Cluster
      jqPathExpressions:
        - '.spec.managed.roles[].connectionLimit'
        - '.spec.managed.roles[].inherit'
